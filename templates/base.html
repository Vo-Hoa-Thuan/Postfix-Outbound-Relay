<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Postfix Relay Panel{% endblock %}</title>
  <meta name="description" content="Postfix Outbound SMTP Relay Management Panel" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/static/app.css" />
  <!-- Apply saved theme immediately to prevent flash -->
  <script>
    (function () {
      var t = localStorage.getItem('rp_theme') || 'dark';
      if (t === 'light') document.documentElement.classList.add('light-pre');
    })();
  </script>
  <style>
    html.light-pre body {
      background: #f0f4f8;
    }
  </style>
</head>

<body>

  <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-icon">✉</span>
      <span class="logo-text">RelayPanel</span>
    </div>

    <nav class="sidebar-nav">
      <a href="/" class="nav-item {% if active_page == 'dashboard' %}active{% endif %}">
        <span class="nav-icon">⬡</span><span class="nav-label" data-i18n="nav_dashboard">Dashboard</span>
      </a>
      <a href="/ips" class="nav-item {% if active_page == 'ips' %}active{% endif %}">
        <span class="nav-icon">◈</span><span class="nav-label" data-i18n="nav_ips">IP Manager</span>
      </a>
      <a href="/rotation" class="nav-item {% if active_page == 'rotation' %}active{% endif %}">
        <span class="nav-icon">↻</span><span class="nav-label" data-i18n="nav_rotation">IP Rotation</span>
      </a>
      <a href="/rspamd" class="nav-item {% if active_page == 'rspamd' %}active{% endif %}">
        <span class="nav-icon">⚙</span><span class="nav-label" data-i18n="nav_rspamd">Rspamd</span>
      </a>
      <a href="/logs" class="nav-item {% if active_page == 'logs' %}active{% endif %}">
        <span class="nav-icon">≡</span><span class="nav-label" data-i18n="nav_logs">SMTP Monitor</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <span class="version-badge">v1.0.0</span>
    </div>
  </aside>

  <!-- ── Main content ────────────────────────────────────────────────────── -->
  <div class="main-wrap">

    <header class="topbar">
      <button class="sidebar-toggle" onclick="document.getElementById('sidebar').classList.toggle('collapsed')"
        title="Toggle sidebar">☰</button>
      <h1 class="page-title">{% block page_title %}Dashboard{% endblock %}</h1>
      <div class="topbar-right">
        <span class="topbar-time" id="clock"></span>

        <!-- Language Toggle -->
        <button class="ctrl-btn" id="langBtn" onclick="toggleLang()" title="Switch language">
          <span id="langLabel">VI</span>
        </button>

        <!-- Theme Toggle -->
        <button class="ctrl-btn" id="themeBtn" onclick="toggleTheme()" title="Switch theme">
          <span id="themeIcon">☀</span>
        </button>
      </div>
    </header>

    <!-- Flash messages -->
    {% if msg %}
    <div class="flash flash-success">✓ {{ msg }}</div>
    {% endif %}
    {% if error %}
    <div class="flash flash-error">✕ {{ error }}</div>
    {% endif %}

    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>

    // ── Language ─────────────────────────────────────────────────────────
    let currentLang = localStorage.getItem('rp_lang') || 'vi';

    function applyLang(lang) {
      const dict = LANGS[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (dict[key] !== undefined) el.textContent = dict[key];
      });
      document.getElementById('langLabel').textContent = lang === 'vi' ? 'EN' : 'VI';
    }

    function toggleLang() {
      currentLang = currentLang === 'vi' ? 'en' : 'vi';
      localStorage.setItem('rp_lang', currentLang);
      applyLang(currentLang);
    }

    // ── Theme ─────────────────────────────────────────────────────────────
    let currentTheme = localStorage.getItem('rp_theme') || 'dark';

    function applyTheme(theme) {
      if (theme === 'light') {
        document.body.classList.add('light');
        document.getElementById('themeIcon').textContent = '🌙';
      } else {
        document.body.classList.remove('light');
        document.getElementById('themeIcon').textContent = '☀';
      }
      document.documentElement.classList.remove('light-pre');
    }

    function toggleTheme() {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      localStorage.setItem('rp_theme', currentTheme);
      applyTheme(currentTheme);
    }

    // ── Live Clock ───────────────────────────────────────────────────────
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    // ── Init ─────────────────────────────────────────────────────────────
    applyTheme(currentTheme);
    applyLang(currentLang);
    updateClock();
    setInterval(updateClock, 1000);

    // Auto-dismiss flash messages
    setTimeout(() => {
      document.querySelectorAll('.flash').forEach(el => {
        el.style.transition = 'opacity 0.5s';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 500);
      });
    }, 4000);
  </script>

  {% block scripts %}{% endblock %}
</body>

</html>
