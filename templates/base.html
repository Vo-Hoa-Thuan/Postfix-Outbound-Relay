<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Postfix Relay Panel{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/app.css?v=2026.1" />
  <!-- Logo/Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="/static/logo.png?v=2" />
  <link rel="icon" type="image/png" sizes="32x32" href="/static/logo.png?v=2" />
  <link rel="shortcut icon" href="/static/logo.png?v=2" />
  <link rel="apple-touch-icon" href="/static/logo.png?v=2" />
  <script>
    (function () {
      var t = localStorage.getItem('rp_theme') || 'dark';
      if (t === 'light') document.documentElement.classList.add('light-pre');
    })();
  </script>
</head>
<body class="{% if request.cookies.get('theme') == 'light' %}light{% endif %}">

  <header class="app-header">
    <div class="logo-area" style="display: flex; align-items: center; gap: 0.5rem;">
      <img src="/static/logo.png" alt="Logo" style="height: 28px; width: auto;" onerror="this.style.display='none'; document.getElementById('fallback-icon').style.display='block';" />
      <div class="logo-icon" id="fallback-icon" style="display: none;">✉</div>
      <div class="logo-text">RelayPanel</div>
    </div>

    <style>
      .nav-tab.dropdown-btn {
        border: none;
        background: transparent;
        cursor: pointer;
        outline: none;
        font-family: inherit;
        font-size: inherit;
      }
    </style>

    <nav class="nav-tabs">
      <a href="/" class="nav-tab {% if active_page == 'dashboard' %}active{% endif %}">
        <span class="icon">⬡</span> <span data-i18n="nav_dashboard">Bảng điều khiển</span>
      </a>

      <a href="/ips" class="nav-tab {% if active_page in ['ips', 'rotation', 'rotation_history'] %}active{% endif %}">
        <span class="icon">◈</span> <span data-i18n="nav_network">Mạng & IP</span>
      </a>

      <a href="/queue" class="nav-tab {% if active_page == 'queue' %}active{% endif %}">
        <span class="icon">📊</span> <span data-i18n="nav_queue">Quản lý Hàng đợi</span>
      </a>

      <a href="/diagnostics" class="nav-tab {% if active_page in ['rspamd', 'diagnostics'] %}active{% endif %}">
        <span class="icon">🩺</span> <span data-i18n="nav_system">Hệ thống</span>
      </a>

      <a href="/settings" class="nav-tab {% if active_page == 'settings' %}active{% endif %}">
        <span class="icon">⚙️</span> <span data-i18n="nav_settings">Cài đặt</span>
      </a>
    </nav>

    <div class="header-actions" style="display: flex; align-items: center; gap: 0.75rem;">
      <!-- Language Switcher -->
      <button class="btn btn-secondary btn-xs" onclick="toggleLanguage()" title="Translate" id="langToggleBtn" style="min-width: 60px;">🌐 VN</button>
      
      <button class="btn btn-secondary btn-xs" id="themeBtn" onclick="toggleTheme()">
        <span id="themeIcon">☀</span>
      </button>
    </div>
  </header>

  <div class="flash-container">
    {% if msg %}
    <div class="flash flash-success">✓ {{ msg }}</div>
    {% endif %}
    {% if error %}
    <div class="flash flash-error">✕ {{ error }}</div>
    {% endif %}
  </div>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/i18n.js"></script>
  <script>
    // Theme Toggle
    function toggleTheme() {
      const html = document.documentElement;
      const body = document.body;
      const isLight = body.classList.toggle('light');
      localStorage.setItem('rp_theme', isLight ? 'light' : 'dark');
      document.getElementById('themeIcon').textContent = isLight ? '🌙' : '☀';
    }

    function toggleLanguage() {
      let current = localStorage.getItem('rp_lang') || 'vn';
      let next = current === 'vn' ? 'en' : 'vn';
      if (typeof switchLanguage === 'function') switchLanguage(next);
      document.getElementById('langToggleBtn').textContent = '🌐 ' + next.toUpperCase();
    }

    // Init theme icon
    window.addEventListener('DOMContentLoaded', () => {
      const isLight = document.body.classList.contains('light');
      document.getElementById('themeIcon').textContent = isLight ? '🌙' : '☀';
      
      let currentLang = localStorage.getItem('rp_lang') || 'vn';
      document.getElementById('langToggleBtn').textContent = '🌐 ' + currentLang.toUpperCase();
      
      // Auto-dismiss flashes
      setTimeout(() => {
        document.querySelectorAll('.flash').forEach(f => {
          f.style.opacity = '0';
          f.style.transform = 'translateX(20px)';
          setTimeout(() => f.remove(), 300);
        });
      }, 5000);
    });
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
